[alembic]
# Path to the migrations directory, relative to this file.
script_location = migrations

# Template for revision file names.
file_template = %%(rev)s_%%(slug)s

# Timezone for --autogenerate timestamps.
timezone = UTC

# Leave sqlalchemy.url blank — env.py reads it from QF_DATABASE_URL / app settings.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
